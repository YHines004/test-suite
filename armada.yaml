      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-3-2021-06
  image:
    repository: gresearch/armada-scheduler
    tag: "0.20.36"
  applicationConfig:
    grpc:
      port: 50051
    auth:
      anonymousAuth: true
      permissionGroupMapping:
        execute_jobs: ["everyone"]
    armadaApi:
      armadaUrl: armada-server.armada.svc.cluster.local:50051
      forceNoTls: true
    pulsar:
      URL: pulsar://armada-pulsar-broker.data.svc.cluster.local:6650
    postgres:
      connection:
        host: armada-postgresql.data.svc.cluster.local
        port: 5432
        user: armada
        password: armada
        dbname: scheduler
        sslmode: disable
